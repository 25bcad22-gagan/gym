<!DOCTYPE html>
<html>
<head>
    <title>Gym Portfolio</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

    <h1>🏋️ Gym Member Management</h1>

    <div class="form">
        <input type="text" id="name" placeholder="Name">
        <input type="number" id="age" placeholder="Age">
        <input type="text" id="plan" placeholder="Plan (Monthly/Yearly)">
        <button onclick="addMember()">Add Member</button>
    </div>

    <h2>Members List</h2>
    <table id="membersTable">
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Age</th>
                <th>Plan</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <script src="/static/script.js"></script>

</body>
</html>
